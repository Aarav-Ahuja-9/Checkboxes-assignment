<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>1 Million Checkboxes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <style>
      body { margin: 0; overflow: hidden; background: #121212; font-family: sans-serif; }
      #adminBtn {
        position: fixed;
        background: #df1414d2;
        border: 0;
        outline: 0;
        border: 1px dashed white;
        padding: 15px;
        border-radius: 100px;
        margin-top: 10px;
        margin-left: 10px;
      }

      #adminBtn i {
        font-size: 20px;
        color: white;
      }
    </style>
  </head>
  <body>
    <button id="adminBtn"><i class="fa-regular fa-trash-can"></i></button>
    <canvas id="canvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const myName = prompt("What is your name?") || "Anonymous";

      const TOTAL_BOXES = 1000000;
      const BOX_SIZE = 24;
      const COLUMNS = 1000;
      let checkboxState = new Uint8Array(125000);
      let hoveredIndex = -1;
      
      // Floating names: { x, y, startY, name, startTime }
      let activeNames = [];
      const ANIM_DURATION = 2000; // 2 seconds

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const now = Date.now();

        // 1. Draw Checkboxes
        for (let i = 0; i < TOTAL_BOXES; i++) {
          const x = (i % COLUMNS) * BOX_SIZE;
          const y = Math.floor(i / COLUMNS) * BOX_SIZE;

          if (x > canvas.width || y > canvas.height) continue;

          const isChecked = checkboxState[Math.floor(i / 8)] & (1 << (i % 8));
          const isHovered = (i === hoveredIndex);

          ctx.beginPath();
          ctx.roundRect(x + 3, y + 3, 18, 18, 4);
          
          if (isChecked) {
            ctx.fillStyle = '#3b82f6'; 
            ctx.fill();
            ctx.beginPath();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.moveTo(x + 8, y + 12); ctx.lineTo(x + 11, y + 15); ctx.lineTo(x + 16, y + 9);
            ctx.stroke();
          } else {
            ctx.fillStyle = isHovered ? '#334155' : '#1e293b'; 
            ctx.fill();
          }
        }

        // 2. Draw & Animate Floating Names
        activeNames = activeNames.filter(item => {
          const elapsed = now - item.startTime;
          if (elapsed > ANIM_DURATION) return false;

          // Animation Progress (0 to 1)
          const progress = elapsed / ANIM_DURATION;
          
          // Style calculations
          const opacity = 1 - progress; // Fade out
          const currentY = item.startY - (progress * 30); // Float up 30 pixels

          ctx.save();
          ctx.globalAlpha = opacity;
          ctx.font = "bold 12px sans-serif";
          ctx.textAlign = "center";
          
          // Draw a small pill background
          const textWidth = ctx.measureText(item.name).width;
          ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
          ctx.beginPath();
          ctx.roundRect(item.x - (textWidth/2) - 6, currentY - 14, textWidth + 12, 20, 10);
          ctx.fill();

          // Draw the name
          ctx.fillStyle = "#ffffff";
          ctx.fillText(item.name, item.x, currentY);
          ctx.restore();

          return true;
        });

        // Always running the loop for smooth animation
        requestAnimationFrame(draw);
      }

      // Start the loop
      requestAnimationFrame(draw);

      socket.on("full_state", (data) => {
        checkboxState = new Uint8Array(data);
      });

      socket.on("update", (data) => {
        const byte = Math.floor(data.index / 8);
        const bit = data.index % 8;
        if (data.checked) checkboxState[byte] |= 1 << bit;
        else checkboxState[byte] &= ~(1 << bit);
        
        const x = (data.index % COLUMNS) * BOX_SIZE;
        const y = Math.floor(data.index / COLUMNS) * BOX_SIZE;

        activeNames.push({
          x: x + (BOX_SIZE / 2),
          startY: y - 5,
          name: data.username || "Someone",
          startTime: Date.now()
        });
      });

      socket.on("error_message", (msg) => {
    alert(msg); 
});

      canvas.onmousemove = (e) => {
        const col = Math.floor(e.clientX / BOX_SIZE);
        const row = Math.floor(e.clientY / BOX_SIZE);
        hoveredIndex = row * COLUMNS + col;
      };

      canvas.onclick = (e) => {
        const col = Math.floor(e.clientX / BOX_SIZE);
        const row = Math.floor(e.clientY / BOX_SIZE);
        const index = row * COLUMNS + col;

        if (index >= 0 && index < TOTAL_BOXES) {
          const isChecked = !(checkboxState[Math.floor(index / 8)] & (1 << (index % 8)));
          socket.emit("toggle", { index, checked: isChecked, username: myName });
        }
      };

      document.getElementById("adminBtn").onclick = () => {
        const password = prompt("Admin Password:");
        if (password) socket.emit("reset_all", { password });
      };

      window.onresize = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      };
    </script>
  </body>
</html>
