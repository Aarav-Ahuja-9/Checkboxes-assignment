<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>1 Million Checkboxes</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #121212;
        font-family: sans-serif;
      }
      #adminBtn {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 100;
        padding: 10px 20px;
        background: #dc2626;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      #adminBtn:hover {
        background: #b91c1c;
      }
    </style>
  </head>
  <body>
    <button id="adminBtn">Clear Everything</button>
    <canvas id="canvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const TOTAL_BOXES = 1000000;
      const BOX_SIZE = 24;
      const COLUMNS = 1000;
      let checkboxState = new Uint8Array(125000);
      let hoveredIndex = -1;

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    for (let i = 0; i < TOTAL_BOXES; i++) {
        const x = (i % COLUMNS) * BOX_SIZE;
        const y = Math.floor(i / COLUMNS) * BOX_SIZE;

        if (x > canvas.width || y > canvas.height) continue;

        const isChecked = checkboxState[Math.floor(i / 8)] & (1 << (i % 8));
        const isHovered = (i === hoveredIndex);

        const padding = 3;
        const rectSize = BOX_SIZE - (padding * 2);

        ctx.beginPath();
        if (ctx.roundRect) {
            ctx.roundRect(x + padding, y + padding, rectSize, rectSize, 4);
        } else {
            ctx.rect(x + padding, y + padding, rectSize, rectSize);
        }
        
        if (isChecked) {
            ctx.fillStyle = '#3b82f6'; 
            ctx.fill();
            
            ctx.beginPath();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.moveTo(x + 8, y + 12);
            ctx.lineTo(x + 11, y + 15);
            ctx.lineTo(x + 16, y + 9);
            ctx.stroke();
        } else {
            ctx.fillStyle = isHovered ? '#334155' : '#1e293b'; 
            ctx.fill();
        }
    }
}

      socket.on("full_state", (data) => {
        checkboxState = new Uint8Array(data);
        draw();
      });
      socket.on("update", (data) => {
        const byte = Math.floor(data.index / 8);
        const bit = data.index % 8;
        if (data.checked) checkboxState[byte] |= 1 << bit;
        else checkboxState[byte] &= ~(1 << bit);
        draw();
      });
      socket.on("error_message", (msg) => alert(msg));

      canvas.onmousemove = (e) => {
        const col = Math.floor(e.clientX / BOX_SIZE);
        const row = Math.floor(e.clientY / BOX_SIZE);
        hoveredIndex = row * COLUMNS + col;
        draw();
      };

      canvas.onclick = (e) => {
        const col = Math.floor(e.clientX / BOX_SIZE);
        const row = Math.floor(e.clientY / BOX_SIZE);
        const index = row * COLUMNS + col;

        if (index >= 0 && index < TOTAL_BOXES) {
          const isChecked = !(
            checkboxState[Math.floor(index / 8)] &
            (1 << (index % 8))
          );

          const byte = Math.floor(index / 8);
          const bit = index % 8;
          if (isChecked) checkboxState[byte] |= 1 << bit;
          else checkboxState[byte] &= ~(1 << bit);

          draw();
          socket.emit("toggle", { index, checked: isChecked });
        }
      };

      document.getElementById("adminBtn").onclick = () => {
        const password = prompt("Admin Password:");
        if (password) socket.emit("reset_all", { password });
      };

      window.onresize = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        draw();
      };
    </script>
  </body>
</html>
